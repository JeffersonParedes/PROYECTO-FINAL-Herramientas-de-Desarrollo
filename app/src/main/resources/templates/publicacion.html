<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<!-- HEAD desde base -->
<head th:replace="base :: head('Publicación | Nexo Foro')"></head>

<body>

<!-- NAVBAR desde base -->
<nav th:replace="base :: navbar"></nav>

<div class="fh-layout">

    <!-- SIDEBAR desde base -->
    <aside th:replace="base :: sidebar"></aside>

    <!-- MAIN -->
    <main class="fh-main">

        <!-- Publicación -->
        <div class="fh-card">

            <div class="card-body-inner">

                <div class="card-meta">
                    <span class="badge-subforo"
                          th:text="${publicacion.subforo.nombre}">
                        Subforo
                    </span>
                </div>

                <h3 class="card-title"
                    th:text="${publicacion.titulo}">
                    Título
                </h3>

                <p class="card-excerpt"
                   th:text="${publicacion.contenido}">
                    Contenido
                </p>

                <div class="card-foot">
                    <span>
                        <i class="bi bi-person-circle"></i>
                        <span th:text="${publicacion.autor}"></span>
                    </span>

                    <span>
                        <i class="bi bi-clock"></i>
                        <span th:text="${publicacion.fecha}"></span>
                    </span>
                </div>

            </div>

        </div>

        <!-- Comentarios -->
        <h5 class="mt-4">Comentarios</h5>

        <div th:each="comentario : ${comentarios}" class="fh-card">
            <div class="card-body-inner">
                <p th:text="${comentario.contenido}"></p>
                <small class="text-muted"
                       th:text="${comentario.autor}">
                </small>
            </div>
        </div>

        <!-- Nuevo comentario -->
        <div class="mt-4">
            <form th:action="@{/comentar}" method="post">
                <input type="hidden" name="publicacionId"
                       th:value="${publicacion.id}"/>

                <textarea name="contenido"
                          class="form-control mb-2"
                          placeholder="Escribe un comentario..."
                          required></textarea>

                <button class="btn btn-primary">Comentar</button>
            </form>
        </div>

    </main>
</div><!-- /fh-layout -->

<!-- SCRIPTS desde base -->
<div th:replace="base :: scripts"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
