<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<!-- HEAD desde base -->
<head th:replace="base :: head('Crear Publicación | Nexo Foro')"></head>

<body>

<!-- NAVBAR desde base -->
<nav th:replace="base :: navbar"></nav>

<div class="fh-layout">

    <!-- SIDEBAR desde base -->
    <aside th:replace="base :: sidebar"></aside>

    <!-- MAIN -->
    <main class="fh-main">

        <h2 class="mb-4">Crear Publicación</h2>

        <div class="card p-4" style="background:#1a1d27; border:1px solid #2e3248; border-radius:12px;">

            <form th:action="@{/crear}" method="post">

                <!-- Título -->
                <div class="mb-3">
                    <label class="form-label">Título</label>
                    <input type="text" name="titulo" class="form-control" required>
                </div>

                <!-- Subforo -->
                <div class="mb-3">
                    <label class="form-label">Subforo</label>
                    <select name="subforoId" class="form-select">
                        <option th:each="sub : ${subforos}"
                                th:value="${sub.id}"
                                th:text="${sub.nombre}">
                        </option>
                    </select>
                </div>

                <!-- Contenido -->
                <div class="mb-3">
                    <label class="form-label">Contenido</label>
                    <textarea name="contenido" rows="5" class="form-control" required></textarea>
                </div>
    
                <!-- Botón -->
                <button type="submit" class="btn btn-primary">
                    Publicar
                </button>

            </form>

        </div>

    </main>
</div><!-- /fh-layout -->

<!-- SCRIPTS desde base -->
<div th:replace="base :: scripts"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
