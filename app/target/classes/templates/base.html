<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head th:fragment="head(title)">
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title th:text="${title}">FalkPlace</title>

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <!-- Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>

    <!-- CSS personalizado del foro -->
    <link rel="stylesheet" th:href="@{/css/foro.css}" />
</head>

<body>

<!-- NAVBAR mejorado -->
<nav th:fragment="navbar" class="fh-navbar">
    <a th:href="@{/index}" class="fh-logo">
        <div class="fh-logo-icon">
            <i class="bi bi-chat-dots-fill"></i>
        </div>
        Falk<span>Place</span>
    </a>

    <!-- Barra de búsqueda -->
    <div class="fh-search d-none d-md-block">
        <div class="input-group">
            <input type="text" class="form-control" placeholder="Buscar en el foro..." aria-label="Buscar"/>
            <button class="btn" type="button">
                <i class="bi bi-search"></i>
            </button>
        </div>
    </div>

    <div class="nav-actions">
        <a th:href="@{/login}" class="btn-login">
            <i class="bi bi-box-arrow-in-right"></i> Iniciar Sesiòn
        </a>
        <a th:href="@{/registro}" class="btn-register">
            <i class="bi bi-person-plus"></i> Registro
        </a>
    </div>
</nav>

<!-- SIDEBAR mejorado -->
<aside th:fragment="sidebar" class="fh-sidebar">
    <div class="sidebar-label">
        <i class="bi bi-list-ul me-1"></i> Navegación
    </div>
    <div class="sidebar-link-group">
        <a th:href="@{/index}" class="sub-link">
            <i class="bi bi-house-door-fill me-2"></i> Inicio
        </a>
        <a th:href="@{/tendencias}" class="sub-link">
            <i class="bi bi-fire me-2"></i> Tendencias
        </a>
    </div>

    <div class="sidebar-label mt-4">
        <i class="bi bi-grid-3x3-gap-fill me-1"></i> Subforos
    </div>

    <!-- Videojuegos - Acordeón -->
    <div class="accordion-item">
        <button class="acc-btn" onclick="toggleAccordion(this)">
            <i class="bi bi-controller"></i> Videojuegos
            <i class="bi bi-chevron-down arrow"></i>
        </button>
        <div class="acc-body">
            <a th:href="@{/subforo}" class="sub-link">
                <span class="dot"></span> RPG
            </a>
            <a th:href="@{/subforo}" class="sub-link">
                <span class="dot"></span> FPS
            </a>
            <a th:href="@{/subforo}" class="sub-link">
                <span class="dot"></span> Aventura
            </a>
        </div>
    </div>

    <!-- Tecnología - Acordeón -->
    <div class="accordion-item">
        <button class="acc-btn" onclick="toggleAccordion(this)">
            <i class="bi bi-cpu"></i> Tecnología
            <i class="bi bi-chevron-down arrow"></i>
        </button>
        <div class="acc-body">
            <a th:href="@{/subforo}" class="sub-link">
                <span class="dot"></span> Programación
            </a>
            <a th:href="@{/subforo}" class="sub-link">
                <span class="dot"></span> Hardware
            </a>
            <a th:href="@{/subforo}" class="sub-link">
                <span class="dot"></span> Inteligencia Artificial
            </a>
        </div>
    </div>

    <!-- Música - Acordeón -->
    <div class="accordion-item">
        <button class="acc-btn" onclick="toggleAccordion(this)">
            <i class="bi bi-music-note-beamed"></i> Música
            <i class="bi bi-chevron-down arrow"></i>
        </button>
        <div class="acc-body">
            <a th:href="@{/subforo}" class="sub-link">
                <span class="dot"></span> Rock
            </a>
            <a th:href="@{/subforo}" class="sub-link">
                <span class="dot"></span> Electrónica
            </a>
        </div>
    </div>

    <!-- Entretenimiento -->
    <div class="accordion-item">
        <button class="acc-btn" onclick="toggleAccordion(this)">
            <i class="bi bi-tv"></i> Entretenimiento
            <i class="bi bi-chevron-down arrow"></i>
        </button>
        <div class="acc-body">
            <a th:href="@{/subforo}" class="sub-link">
                <span class="dot"></span> Películas
            </a>
            <a th:href="@{/subforo}" class="sub-link">
                <span class="dot"></span> Series
            </a>
        </div>
    </div>
</aside>

<!-- SCRIPTS GLOBALES -->
<script th:fragment="scripts">
    // Función para el acordeón del sidebar
    function toggleAccordion(btn) {
        const body = btn.nextElementSibling;
        const isOpen = body.classList.contains('show');
        
        // Cerrar otros acordeones abiertos
        document.querySelectorAll('.acc-body.show').forEach(b => {
            if (b !== body) b.classList.remove('show');
        });
        document.querySelectorAll('.acc-btn.open').forEach(b => {
            if (b !== btn) b.classList.remove('open');
        });
        
        // Toggle el actual
        if (!isOpen) {
            body.classList.add('show');
            btn.classList.add('open');
        } else {
            body.classList.remove('show');
            btn.classList.remove('open');
        }
    }

    // Mantener compatibilidad con la función antigua si es necesario
    function toggleAcc(btn) {
        const content = btn.nextElementSibling;
        content.classList.toggle('d-none');
    }

    // Inicializar tooltips de Bootstrap si los usas
    document.addEventListener('DOMContentLoaded', function() {
        var tooltipTriggerList = [].slice.call(document.querySelectorAll('[data-bs-toggle="tooltip"]'));
        tooltipTriggerList.map(function(tooltipTriggerEl) {
            return new bootstrap.Tooltip(tooltipTriggerEl);
        });
    });
</script>
</body>
</html>
